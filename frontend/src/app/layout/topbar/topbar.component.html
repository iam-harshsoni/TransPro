<p-confirmDialog />

<div class="topbar">

    <div class="topbar-left">
        <button class="topbar-menu-btn" (click)="layout.toggle()">
            <i class="pi pi-bars"></i>
        </button>
        <span>TransPro</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">Dashboard</span>
    </div>

    <div class="topbar-right">

        <div class="topbar-search">
            <i class="pi pi-search"></i>
            <input type="text" placeholder="Search... (Ctrl+K)" />
        </div>

        <button class="topbar-icon-btn">
            <i class="pi pi-bell"></i>
        </button>

        <!-- User section — avatar + name + dropdown -->
        <div class="topbar-user-section">

            <!-- Display user full name -->
            <span class="topbar-username">
                {{ auth.currentUser()?.fullName ?? 'Admin' }}
            </span>

            <!-- Avatar circle — click opens dropdown -->
            <div class="topbar-avatar-btn" (click)="toggleMenu()">
                {{ getInitials() }}
            </div>

            <!-- Dropdown menu -->
            @if (menuOpen()) {

            <!-- Invisible backdrop — clicking outside closes menu -->
            <div class="menu-backdrop" (click)="closeMenu()"></div>

            <div class="user-dropdown">

                <!-- User info header inside dropdown -->
                <div class="dropdown-header">
                    <div class="dropdown-avatar">{{ getInitials() }}</div>
                    <div class="dropdown-user-info">
                        <span class="dropdown-name">
                            {{ auth.currentUser()?.fullName ?? 'Admin' }}
                        </span>
                        <span class="dropdown-role">
                            {{ auth.currentUser()?.role ?? 'Administrator' }}
                        </span>
                    </div>
                </div>

                <div class="dropdown-divider"></div>

                <!-- Menu Items -->
                <div class="dropdown-menu">

                    <button class="dropdown-item" (click)="navigateToSettings()">
                        <i class="pi pi-cog"></i>
                        <span>Settings</span>
                    </button>

                    <div class="dropdown-divider"></div>

                    <!-- Logout — styled differently to signal danger -->
                    <button class="dropdown-item dropdown-item-danger" (click)="confirmLogout()">
                        <i class="pi pi-sign-out"></i>
                        <span>Logout</span>
                    </button>

                </div>
            </div>
            }
        </div>

    </div>
</div>
