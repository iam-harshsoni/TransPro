<div class="page-header">
    <div class="breadcrumb-trail">
        Home <i class="pi pi-angle-right"></i>
        <span>Dashboard</span>
    </div>
    <div class="page-title">Dashboard</div>
</div>

<!-- Vertical Form -->
<div class="card">
    <div class="card-header">
        <span class="card-title">Vertical</span>
    </div>
    <div class="card-body">
        <div class="form-field">
            <label class="form-label">Name</label>
            <input class="form-input" type="text" placeholder="" />
        </div>
        <div class="form-field">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" placeholder="" />
        </div>
        <div class="form-field">
            <label class="form-label">Age</label>
            <input class="form-input" type="number" placeholder="" />
        </div>
    </div>
</div>

<!-- Grid Form -->
<div class="card">
    <div class="card-header">
        <span class="card-title">Vertical Grid</span>
    </div>
    <div class="card-body">
        <div class="form-grid-2">
            <div class="form-field">
                <label class="form-label">Name</label>
                <input class="form-input" type="text" placeholder="" />
            </div>
            <div class="form-field">
                <label class="form-label">Email</label>
                <input class="form-input" type="email" placeholder="" />
            </div>
        </div>
    </div>
</div>

<!-- Advanced Form -->
<div class="card">
    <div class="card-header">
        <span class="card-title">Advanced</span>
    </div>
    <div class="card-body">
        <div class="form-grid-2">
            <div class="form-field">
                <label class="form-label">Firstname</label>
                <input class="form-input" type="text" placeholder="" />
            </div>
            <div class="form-field">
                <label class="form-label">Lastname</label>
                <input class="form-input" type="text" placeholder="" />
            </div>
            <div class="form-field form-field-full">
                <label class="form-label">Address</label>
                <textarea class="form-textarea" placeholder=""></textarea>
            </div>
            <div class="form-field">
                <label class="form-label">State</label>
                <input class="form-input" type="text" placeholder="" />
            </div>
            <div class="form-field">
                <label class="form-label">Zip</label>
                <input class="form-input" type="text" placeholder="" />
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-secondary">Cancel</button>
            <button class="btn-primary">Submit</button>
        </div>
    </div>
</div>
