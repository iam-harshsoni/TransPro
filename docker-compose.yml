services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transpro_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - JwtSettings__SecretKey=${JwtSettings__SecretKey}
      - JwtSettings__Issuer=${JwtSettings__Issuer}
      - JwtSettings__Audience=${JwtSettings__Audience}
      - JwtSettings__ExpiryMinutes=${JwtSettings__ExpiryMinutes}
    volumes:
      - transpro_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - transpro_network

  db:
    image: postgres:16-alpine
    container_name: transpro_db
    environment:
      - POSTGRES_DB=transpro_db
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - transpro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d transpro_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - transpro_network

volumes:
  transpro_pgdata:
  transpro_logs:


networks:
  transpro_network:
    driver: bridge
